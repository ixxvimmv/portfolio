<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karyzza Bernardo - Portfolio</title>
  <meta name="description" content="Front-end developer portfolio">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* COMPLETE STYLES - EMBEDDED (NO EXTERNAL FILES NEEDED) */
    :root {
      --bg: #0b0c10;
      --panel: #1a1b26;
      --fg: #c0caf5;
      --muted: #565f89;
      --primary: #7aa2f7;
      --accent: #9ec9ff;
      --ring: rgba(122,162,247,.4);
      --shadow: 0 20px 40px rgba(0,0,0,.4);
      --border: rgba(255,255,255,.1);
    }
    
    [data-theme="light"] {
      --bg: #f8fafc;
      --panel: #ffffff;
      --fg: #0f172a;
      --muted: #64748b;
      --primary: #3b82f6;
      --accent: #60a5fa;
      --ring: rgba(59,130,246,.3);
      --shadow: 0 10px 30px rgba(0,0,0,.15);
      --border: rgba(0,0,0,.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1e1e2e 100%);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26,27,38,.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }
    .navbar__inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
